# Neuronal Morphology Pipeline — CoND Dataset Configuration
# Dataset: funalab/CoND (SH-SY5Y, phase contrast)
# Modes (set ml.task below to switch):
#   "classification" — binary diff vs undiff, flat folder structure
#   "regression"     — continuous day 0→22, time_course structure

pipeline:
  name: "neuronal-morphology-pipeline"
  version: "1.2-CoND"
  phase: "CoND"
  dataset: "funalab/CoND"

# Paths
paths:
  raw_dir:           "data/CoND"                # classification: differentiated/ + undifferentiated/
  time_course_dir:   "data/CoND/time_course"    # regression: ratio_data_dishX/Yday/
  preprocessed_dir:  "data/preprocessed_CoND"
  features_dir:      "outputs/features_CoND"
  models_dir:        "outputs/models_CoND"
  plots_dir:         "outputs/plots_CoND"
  results_dir:       "outputs/results_CoND"

# Module 1 — Preprocessing
preprocessing:
  target_size: [200, 200]     # CoND images are natively 200x200
  grayscale: true
  normalize: true

# Module 3 — Feature Extraction
feature_extraction:
  tool: "scikit-image"
  features:
    - soma_area_mean      # average cell body size
    - circularity_mean    # roundness: 1 = circle, 0 = elongated
    - neurite_length      # total skeleton length
    - branch_count        # number of neurite branch points
    - neurite_density     # neurite_length / cell area
  threshold_method: "otsu"

# Module 5 — Pairing
# classification: random synthetic cross-sectional pairing
# regression:     real longitudinal pairing (same dish, 0day → Xday)
pairing:
  random_seed: 42
  pair_type: "synthetic_cross_sectional"   # classification mode only

# Module 7 — Augmentation
augmentation:
  enabled: true
  alpha: 0.05
  target_rows: 7000
  random_seed: 42

# Module 8 — ML Training
# Switch mode by changing task:
#   "classification" → XGBClassifier / RandomForestClassifier / SVC → Acc/F1/AUC
#   "regression"     → XGBRegressor  / RandomForestRegressor  / SVR → RMSE/MAE/R²
ml:
  random_seed: 42
  test_size: 0.2
  cv_folds: 5
  task: "regression"           # or "classification"
  models:
    - xgboost
    - random_forest
    - svr
  metrics:
    - rmse
    - mae
    - r2

# Module 9 — Interpretability
interpretability:
  shap_models:
    - xgboost
    - random_forest
  permutation_models:
    - svr
  n_repeats: 10
  top_n_features: 5
